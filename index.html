<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Do you love me?</title>
<link rel="icon" type="image/png" href="heart.png">

<style>
  body {
    text-align: center;
    font-family: Arial, sans-serif;
    margin: 0;
    background: #ffe6e6;
  }

  h1, h2 {
    font-size: 28px;
  }

  button {
    padding: 12px 22px;
    font-size: 18px;
    margin: 10px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    transform: scale(1.05);
  }

  .yes-btn {
    background-color: green;
    color: white;
  }

  .yes-btn1 {
    background-color: rgb(209, 24, 154);
    color: white;
  }

  .no-btn {
    background-color: rgb(243, 59, 59);
    color: white;
  }

  .no-btn1 {
    background-color: rgb(237, 118, 217);
    color: white;
  }

  #secondChoice {
    display: none;
    margin-top: 20px;
  }

  /* Conteneur final */
  #loveContainer {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100%;
    text-align: center;
  }

  #loveImage {
    width: 300px;
    border-radius: 20px;
    margin-top: 20px;
  }

  #loveMessage {
    font-size: 32px;
    color: #ff0066;
    font-weight: bold;
    margin-top: 15px;
  }
</style>
</head>

<body>

<!-- Première partie -->
<div id="firstChoice">
  <h1>Do you love me? ❤️</h1>
  <button id="yes1" class="yes-btn">Yes 😍</button>
  <button id="no1" class="no-btn">No ❌</button>
</div>

<!-- Deuxième partie -->
<div id="secondChoice">
  <h2>Choose your answer 💖</h2>
  <button id="yes2" class="no-btn1">Yes so much 😍</button>
  <button id="yes3" class="yes-btn1">
    My best Mouka ever ❤️
  </button>
</div>

<!-- Résultat final -->
<div id="loveContainer">
  <img id="loveImage" src="cat.jpg" alt="Love Image">
  <div id="loveMessage">Thank you Joujoutyyyyy ❤️</div>
</div>

<script>
  const noBtn = document.getElementById("no1");

  // Bouton "No" fuit la souris (fun)
  noBtn.addEventListener("mouseover", function() {
    const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
    const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
    noBtn.style.position = "absolute";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
  });

  // Passage à étape 2
  document.getElementById("yes1").onclick = function() {
    document.getElementById("firstChoice").style.display = "none";
    document.getElementById("secondChoice").style.display = "block";
  };

  // Affichage final
  document.getElementById("yes3").onclick = function() {
    document.getElementById("secondChoice").style.display = "none";
    document.getElementById("loveContainer").style.display = "block";
  };
</script>

</body>
</html>
