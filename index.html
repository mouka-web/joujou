<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Do you love me?</title>
<style>
  body {
    text-align: center;
    font-family: Arial, sans-serif;
    margin-top: 50px;
    background: #ffe6e6;
    overflow: hidden;
    position: relative;
  }

  h1, h2 {
    font-size: 28px;
  }

  button {
    padding: 10px 20px;
    font-size: 18px;
    margin: 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    position: relative;
    display: inline-block;
  }

  .yes-btn {
    background-color: green;
    color: white;
  }

  .no-btn {
    background-color: red;
    color: white;
  }

  #secondChoice {
    display: none;
    margin-top: 20px;
  }

  /* Image affichée au centre */
  #loveImage {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    max-width: 80%;
    max-height: 80%;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    z-index: 100;
  }
</style>
</head>
<body>

<h1>Do you love me? ❤️</h1>

<button id="yes1" class="yes-btn">Yes 😍</button>
<button id="no1" class="no-btn">No ❌</button>

<div id="secondChoice">
  <h2>Choose your answer 💖</h2>
  <button id="yes2" class="no-btn">Yes so much 😍 ❌</button>
  <button id="yes3" class="yes-btn">My best Mouka ever, you’re mine, my best princess in the world, my queen ❤️ ✅</button>
</div>

<!-- Image qui va s'afficher -->
<img id="loveImage" src="https://i.imgur.com/4AiXzf8.jpeg" alt="Love Image">

<script>
  const noBtn = document.getElementById("no1");
  const yes2Btn = document.getElementById("yes2");

  function makeButtonRun(btn) {
    btn.addEventListener("mouseover", function() {
      const x = Math.random() * (window.innerWidth - btn.offsetWidth - 20);
      const y = Math.random() * (window.innerHeight - btn.offsetHeight - 20);
      btn.style.position = 'absolute';
      btn.style.left = x + "px";
      btn.style.top = y + "px";
    });
  }

  // Faire fuir les boutons impossibles à cliquer
  makeButtonRun(noBtn);
  makeButtonRun(yes2Btn);

  // Affiche le second choix après "Yes 😍"
  document.getElementById("yes1").addEventListener("click", function() {
    document.getElementById("secondChoice").style.display = "block";
    document.getElementById("secondChoice").scrollIntoView({behavior: "smooth"});
  });

  // Bouton final cliquable : affiche une image au centre
  document.getElementById("yes3").addEventListener("click", function() {
    document.getElementById("loveImage").style.display = "block";
  });
</script>

</body>
</html>
