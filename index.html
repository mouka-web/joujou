<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Do you love me?</title>
<link rel="icon" type="image/png" href="heart.png">
<style>
  body {
    text-align: center;
    font-family: Arial, sans-serif;
    margin: 0;
    background: #ffe6e6;
    overflow: hidden;
  }

  h1, h2 {
    font-size: 28px;
  }

  button {
    padding: 10px 20px;
    font-size: 18px;
    margin: 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
  }

  .yes-btn {
    background-color: green;
    color: white;
  }
  .yes-btn1 {
    background-color: rgb(209, 24, 154);
    color: white;
  }
  .no-btn {
    background-color: rgb(243, 59, 59);
    color: white;
  }
  .no-btn1 {
    background-color: rgb(237, 118, 217);
    color: white;
  }

  #secondChoice {
    display: none;
    margin-top: 20px;
  }

  /* Conteneur image + message */
  #loveContainer {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100vw;
    height: 100vh;
    background-color: #ffe6e6;
    z-index: 100;
    text-align: center;
  }

  #loveImage {
    width: 30%;
    height: 50%;

    border-radius: 100px;
  }

  #loveMessage {
    font-size: 32px;
    color: #ff0066;
    font-weight: bold;
    margin-top: 10px;
  }
</style>
</head>
<body>

<!-- Première partie -->
<div id="firstChoice">
  <h1>Do you love me? ❤️</h1>
  <button id="yes1" class="yes-btn">Yes 😍</button>
  <button id="no1" class="no-btn">No ❌</button>
</div>

<!-- Deuxième partie -->
<div id="secondChoice">
  <h2>Choose your answer 💖</h2>
  <button id="yes2" class="no-btn1">Yes so much 😍</button>
  <button id="yes3" class="yes-btn1">My best Mouka ever, you’re mine, my best princess in the world, my queen ❤️ ✅</button>
</div>

<!-- Conteneur image + message -->
<div id="loveContainer">
  <img id="loveImage" src="cat.jpg" alt="Love Image">
  <div id="loveMessage">Thank you Joujoutyyyyy ❤️</div>
</div>

<script>
  const noBtn = document.getElementById("no1");
  const yes2Btn = document.getElementById("yes2");

  // Faire fuir les boutons impossibles à cliquer
  function makeButtonRun(btn) {
    btn.addEventListener("mouseover", function() {
      const x = Math.random() * (window.innerWidth - btn.offsetWidth - 20);
      const y = Math.random() * (window.innerHeight - btn.offsetHeight - 20);
      btn.style.position = 'absolute';
      btn.style.left = x + "px";
      btn.style.top = y + "px";
    });
  }

  makeButtonRun(noBtn);
  makeButtonRun(yes2Btn);

  // Affiche le second choix après "Yes 😍" et cache la première partie
  document.getElementById("yes1").addEventListener("click", function() {
    document.getElementById("firstChoice").style.display = "none"; // cacher la première partie
    document.getElementById("secondChoice").style.display = "block"; // afficher la deuxième partie
  });

  // Bouton final cliquable : affiche l'image et le message
  document.getElementById("yes3").addEventListener("click", function() {
    document.getElementById("secondChoice").style.display = 'none'; // cacher la deuxième partie
    document.getElementById("loveContainer").style.display = 'block'; // afficher image + message
  });
</script>

</body>
</html>
